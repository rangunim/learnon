<div class="max-w-4xl mx-auto py-10 px-4">
    @let vm = viewModel();

    @if (vm.state; as u) {
    <div class="profile-card rounded-2xl overflow-hidden">

        <div class="profile-header px-8 py-6 flex justify-between items-center">
            <h2 class="profile-header-title text-2xl">
                {{ u.firstName }} {{ u.lastName }}
            </h2>
            <p-button routerLink="/account/edit" label="Edytuj profil" icon="pi pi-user-edit" [outlined]="true"
                size="small" />
        </div>

        <div class="p-8">
            <div class="flex flex-col sm:flex-row gap-10 items-start">

                <!-- Avatar Column -->
                <div class="flex flex-col items-center gap-4">
                    <div class="avatar-frame w-40 h-40 rounded-full overflow-hidden flex items-center justify-center">
                        <img [src]="u.avatarUrl || '/img/avatar.png'" alt="Avatar" class="w-full h-full object-cover">
                    </div>
                </div>

                <!-- Info Column -->
                <div class="flex-1 w-full">
                    <div class="overflow-x-auto">
                        <table class="profile-table w-full text-left border-collapse">
                            <tbody>
                                <tr class="profile-row">
                                    <th class="profile-label py-4 px-4 w-1/3">Imię:</th>
                                    <td class="profile-value py-4 px-4">{{ u.firstName }}</td>
                                </tr>
                                <tr class="profile-row profile-row--alt">
                                    <th class="profile-label py-4 px-4">Nazwisko:</th>
                                    <td class="profile-value py-4 px-4">{{ u.lastName }}</td>
                                </tr>
                                <tr class="profile-row">
                                    <th class="profile-label py-4 px-4">Płeć:</th>
                                    <td class="profile-value py-4 px-4">{{ u.gender || 'Nie podano' }}</td>
                                </tr>
                                <tr class="profile-row profile-row--alt">
                                    <th class="profile-label py-4 px-4">Data urodzenia:</th>
                                    <td class="profile-value py-4 px-4">{{ (u.birthDate | date:'yyyy-MM-dd') || 'Nie
                                        podano'
                                        }}</td>
                                </tr>
                                <tr>
                                    <th class="profile-label py-4 px-4">Adres e-mail:</th>
                                    <td class="profile-value py-4 px-4">{{ u.email }}</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>

    </div>
    }
</div>
