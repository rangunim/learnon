<div class="memory-result flex flex-col items-center justify-center p-8 px-4 text-center animate-fade-in">
    <div
        class="w-32 h-32 flex items-center justify-center mb-8 bg-blue-500 text-white rounded-full text-5xl shadow-xl shadow-blue-200 animate-win-bounce">
        <i class="pi pi-check-circle"></i>
    </div>

    <h2 class="text-4xl font-black text-surface-900 mb-2">Brawo!</h2>
    <p class="text-xl font-bold text-muted-color mb-10">Wszystkie pary dopasowane.</p>

    <div class="w-full max-w-sm p-8 mb-12 bg-surface-ground rounded-3xl border border-surface-border shadow-inner">
        <div class="flex flex-col gap-6">
            <div class="flex justify-between items-center">
                <span class="text-muted-color font-bold uppercase tracking-widest text-xs">Wykonane ruchy</span>
                <p-tag [value]="movesCount().toString()" severity="info"
                    styleClass="px-5 py-2 text-2xl font-black rounded-xl" />
            </div>

            <div class="h-px bg-surface-border"></div>

            <div class="text-xs font-bold text-muted-color uppercase tracking-widest">Świetny wynik!</div>
        </div>
    </div>

    <div class="flex gap-4 justify-center w-full max-w-md">
        <p-button label="Zagraj jeszcze raz" icon="pi pi-refresh" [raised]="true" [fluid]="true"
            styleClass="py-4 font-black text-lg" (onClick)="onRestart()" />
        <p-button [routerLink]="['/chapters', chapterId()]" label="Zakończ" [outlined]="true" [fluid]="true"
            severity="info" styleClass="py-4 font-bold" />
    </div>
</div>
